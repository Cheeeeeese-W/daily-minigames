<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cascade 爆裂连锁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0F0F23;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";

/* ===== CONFIG ===== */
var CFG = {
  COLS: 10, ROWS: 15, CELL: 36,
  COLORS: ['#FF4757','#3742FA','#2ED573','#ECCC68','#A55EEA'],
  BG_TOP: '#0F0F23', BG_BOT: '#1A1A2E',
  GRID_LINE: 'rgba(255,255,255,0.05)',
  R1: 10, R2: 16, R3: 24,
  DROP_MS: 200, MERGE_FLASH: 150, MERGE_SCALE: 200,
  EXPLODE_MS: 300, FRAG_FLY: 250, VIB_MS: 100, VIB_WARN: 200,
  GRAVITY: 800, FRAG_SPD: 150, FRAG_GRAV: 200, FRAG_ANGLE: 15,
  VIB_INTERVAL: 8000, VIB_PROB: 0.3, VIB_MAX: 1,
  SCORE_L1: 10, SCORE_L2: 30, SCORE_L3: 100,
  COMBO_STEP: 0.5, MAX_DEPTH: 10, MAX_CONSEC: 2,
  GRACE_MS: 3000, MAX_BALLS: 150
};

/* ===== CANVAS ===== */
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var dpr = Math.max(1, window.devicePixelRatio || 1);
var W, H, cellSz, gridOX, gridOY;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var cw = Math.floor(W * 0.92 / CFG.COLS);
  var ch = Math.floor((H - 90) / CFG.ROWS);
  cellSz = Math.min(cw, ch, CFG.CELL);
  gridOX = (W - CFG.COLS * cellSz) / 2;
  gridOY = 52;
}
window.addEventListener('resize', resize);
resize();

/* ===== AUDIO ===== */
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, vol, type) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playSweep(f1, f2, dur, vol) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  var bufSz = audioCtx.sampleRate * dur;
  var buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  var filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 2000;
  src.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + dur);
}

function sndDrop() { playTone(400, 0.05, 0.3); }
function sndMergeLv(lv) {
  if (lv === 1) playSweep(600, 800, 0.1, 0.5);
  else playSweep(500, 900, 0.15, 0.6);
}
function sndExplode() { playNoise(0.2, 0.7); }
function sndFrag() { playTone(1000, 0.03, 0.2); }
function sndCombo(n) { playTone(600 * Math.pow(1.0594, n), 0.08, 0.4); }
function sndVibWarn() { playTone(100, 0.2, 0.2, 'square'); }
function sndGameOver() { playSweep(800, 200, 0.5, 0.5); }

/* ===== BALL ===== */
var nextBallId = 1;
function Ball(col, row, ci, lv) {
  this.id = nextBallId++;
  this.col = col; this.row = row;
  this.ci = ci; this.level = lv;
  this.x = col * cellSz; this.y = -cellSz;
  this.tgtY = row * cellSz;
  this.scale = 1; this.opacity = 1;
  this.anim = null;
  this.pulse = Math.random() * Math.PI * 2;
}
Object.defineProperty(Ball.prototype, 'color', {
  get: function() { return CFG.COLORS[this.ci]; }
});
Ball.prototype.cells = function() {
  if (this.level < 3) return [{c:this.col,r:this.row}];
  return [{c:this.col,r:this.row},{c:this.col+1,r:this.row},{c:this.col,r:this.row+1},{c:this.col+1,r:this.row+1}];
};

/* ===== GAME STATE ===== */
var grid, balls, score, hi, combo, maxCombo, bestChain, nextCI;
var lastCC, consecC, vibrateAcc, gameOver, graceTimer, graceCol;
var anims, shakeX, shakeY, shakeTimer;
var state; // 'idle','dropping','merging','vibrating','gameover','start'

function initState() {
  grid = [];
  for (var c = 0; c < CFG.COLS; c++) {
    grid[c] = [];
    for (var r = 0; r < CFG.ROWS; r++) grid[c][r] = null;
  }
  balls = []; score = 0; combo = 0; maxCombo = 0; bestChain = 0;
  nextCI = randCI(-1); lastCC = -1; consecC = 0;
  vibrateAcc = 0; gameOver = false; graceTimer = -1; graceCol = -1;
  anims = []; shakeX = 0; shakeY = 0; shakeTimer = 0;
  state = 'idle';
  hi = parseInt(localStorage.getItem('cascade_hi') || '0', 10);
  maxCombo = parseInt(localStorage.getItem('cascade_mc') || '0', 10);
}

function randCI(prev) {
  var ci;
  do { ci = Math.floor(Math.random() * CFG.COLORS.length); }
  while (ci === prev && consecC >= CFG.MAX_CONSEC);
  if (ci === lastCC) consecC++;
  else { lastCC = ci; consecC = 1; }
  return ci;
}

/* ===== GRID HELPERS ===== */
function removeFromGrid(ball) {
  var cells = ball.cells();
  for (var i = 0; i < cells.length; i++) {
    var g = grid[cells[i].c];
    if (g) g[cells[i].r] = null;
  }
}
function placeOnGrid(ball) {
  var cells = ball.cells();
  for (var i = 0; i < cells.length; i++) {
    grid[cells[i].c][cells[i].r] = ball;
  }
}
function canPlace2x2(c, r) {
  return c >= 0 && c+1 < CFG.COLS && r >= 0 && r+1 < CFG.ROWS &&
    grid[c][r]===null && grid[c+1][r]===null && grid[c][r+1]===null && grid[c+1][r+1]===null;
}
function findNearest2x2(oc, orow) {
  for (var dist = 1; dist < 6; dist++) {
    for (var dc = -dist; dc <= dist; dc++) {
      for (var dr = -dist; dr <= dist; dr++) {
        var nc = oc+dc, nr = orow+dr;
        if (nc>=0 && nc+1<CFG.COLS && nr>=0 && nr+1<CFG.ROWS && canPlace2x2(nc,nr))
          return {col:nc,row:nr};
      }
    }
  }
  return null;
}
function findNearestEmpty(oc, orow) {
  for (var dist = 1; dist < 5; dist++) {
    for (var dc = -dist; dc <= dist; dc++) {
      for (var dr = -dist; dr <= dist; dr++) {
        var nc = oc+dc, nr = orow+dr;
        if (nc>=0 && nc<CFG.COLS && nr>=0 && nr<CFG.ROWS && grid[nc][nr]===null)
          return {col:nc,row:nr};
      }
    }
  }
  return null;
}

function applyColumnGravity(col) {
  if (col < 0 || col >= CFG.COLS) return;
  var changed = true;
  while (changed) {
    changed = false;
    for (var r = CFG.ROWS - 1; r >= 1; r--) {
      if (grid[col][r] === null) {
        for (var above = r - 1; above >= 0; above--) {
          if (grid[col][above] !== null) {
            var ball = grid[col][above];
            grid[col][above] = null;
            grid[col][r] = ball;
            ball.row = r;
            ball.tgtY = r * cellSz;
            if (ball.level >= 3) {
              // 2x2 ball: update all cells
              if (col+1 < CFG.COLS) {
                grid[col+1][above] = null;
                grid[col+1][r] = ball;
              }
              if (above+1 < CFG.ROWS) grid[col][above+1] = null;
              if (r+1 < CFG.ROWS) grid[col][r+1] = ball;
              if (col+1 < CFG.COLS && above+1 < CFG.ROWS) grid[col+1][above+1] = null;
              if (col+1 < CFG.COLS && r+1 < CFG.ROWS) grid[col+1][r+1] = ball;
            }
            changed = true;
            break;
          }
        }
      }
    }
  }
}

/* ===== NEIGHBOR CHECK ===== */
function getSameNeighbors(ball) {
  var res = [], seen = {};
  var cells = ball.cells();
  var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (var i = 0; i < cells.length; i++) {
    for (var d = 0; d < dirs.length; d++) {
      var nc = cells[i].c + dirs[d][0], nr = cells[i].r + dirs[d][1];
      var key = nc+','+nr;
      if (seen[key]) continue; seen[key] = true;
      if (nc<0||nc>=CFG.COLS||nr<0||nr>=CFG.ROWS) continue;
      var nb = grid[nc][nr];
      if (nb && nb.ci===ball.ci && nb.level===ball.level && nb.id!==ball.id) {
        var dup = false;
        for (var j = 0; j < res.length; j++) if (res[j].id===nb.id) { dup=true; break; }
        if (!dup) res.push(nb);
      }
    }
  }
  return res;
}

/* ===== ANIMATION QUEUE ===== */
function addAnim(type, ball, data, dur) {
  anims.push({type:type, ball:ball, data:data||{}, t0:performance.now(), dur:dur||200, done:false});
}

/* ===== MERGE ===== */
function tryMerge(ball, depth) {
  if (depth > CFG.MAX_DEPTH) { endCombo(); return; }
  if (ball.level >= 3) {
    var nb3 = getSameNeighbors(ball);
    if (nb3.length > 0) { doExplode(ball, nb3[0], depth); return; }
    endCombo(); return;
  }
  var nbs = getSameNeighbors(ball);
  if (nbs.length === 0) { endCombo(); return; }
  var partner = nbs[0];
  combo++;
  if (combo > 1) sndCombo(combo);
  var sc = ball.level === 1 ? CFG.SCORE_L1 : CFG.SCORE_L2;
  var mult = 1 + (combo - 1) * CFG.COMBO_STEP;
  score += Math.floor(sc * mult);

  removeFromGrid(ball); removeFromGrid(partner);
  balls = balls.filter(function(b){return b.id!==ball.id && b.id!==partner.id;});

  var nl = ball.level + 1;
  var nc = ball.col, nr = ball.row;
  if (nl >= 3) {
    if (!canPlace2x2(nc, nr)) {
      var pos = findNearest2x2(nc, nr);
      if (pos) { nc = pos.col; nr = pos.row; }
      else { doExplode(ball, partner, depth); return; }
    }
  }
  var nb = new Ball(nc, nr, ball.ci, nl);
  if (nl >= 3) placeOnGrid(nb); else grid[nc][nr] = nb;
  balls.push(nb);
  // apply gravity so balls above the merge gap fall down
  if (nl >= 3) {
    applyColumnGravity(nc);
    if (nc+1 < CFG.COLS) applyColumnGravity(nc+1);
  } else {
    applyColumnGravity(nc);
  }
  sndMergeLv(ball.level);
  addAnim('merge', nb, {}, CFG.MERGE_FLASH + CFG.MERGE_SCALE);
  // chain
  state = 'merging';
  setTimeout(function(){ tryMerge(nb, depth+1); }, CFG.MERGE_FLASH + CFG.MERGE_SCALE + 30);
}

function endCombo() {
  if (combo > maxCombo) { maxCombo = combo; }
  combo = 0;
  if (!gameOver) state = 'idle';
}

/* ===== EXPLODE ===== */
function doExplode(b1, b2, depth) {
  removeFromGrid(b1); removeFromGrid(b2);
  balls = balls.filter(function(b){return b.id!==b1.id && b.id!==b2.id;});
  combo++;
  var mult = 1 + (combo-1)*CFG.COMBO_STEP;
  score += Math.floor(CFG.SCORE_L3 * mult);
  sndExplode();

  var cx = (b1.col + b2.col) / 2, cy = (b1.row + b2.row) / 2;
  var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  var frags = [];
  for (var i = 0; i < 4; i++) {
    var angle = Math.atan2(dirs[i][1], dirs[i][0]) + (Math.random()-0.5)*CFG.FRAG_ANGLE*Math.PI/180;
    frags.push({
      ci: b1.ci,
      sx: cx*cellSz+cellSz/2, sy: cy*cellSz+cellSz/2,
      vx: Math.cos(angle)*CFG.FRAG_SPD, vy: Math.sin(angle)*CFG.FRAG_SPD,
      tc: Math.round(cx+dirs[i][0]), tr: Math.round(cy+dirs[i][1])
    });
  }
  addAnim('explode', null, {x:cx*cellSz+cellSz/2,y:cy*cellSz+cellSz/2,color:b1.color}, CFG.EXPLODE_MS);
  shakeTimer = 150; shakeX = 5; shakeY = 5;
  // schedule fragments
  state = 'merging';
  setTimeout(function(){
    var affectedCols = {};
    affectedCols[Math.round(cx)] = true;
    affectedCols[Math.round(b1.col)] = true;
    affectedCols[Math.round(b2.col)] = true;
    for (var j = 0; j < frags.length; j++) {
      processFrag(frags[j], depth);
      affectedCols[frags[j].tc] = true;
    }
    // apply gravity to all affected columns
    for (var col in affectedCols) {
      if (affectedCols.hasOwnProperty(col)) applyColumnGravity(parseInt(col, 10));
    }
    // after fragments, end combo or continue chain
    setTimeout(function(){ checkAllMerges(depth+1); }, 100);
  }, CFG.EXPLODE_MS + 50);
}

function processFrag(frag, depth) {
  var tc = frag.tc, tr = frag.tr;
  if (tc<0||tc>=CFG.COLS||tr<0||tr>=CFG.ROWS) return;
  var exist = grid[tc][tr];
  if (exist === null) {
    var b = new Ball(tc, tr, frag.ci, 1);
    b.y = frag.sy - gridOY; b.x = frag.sx - gridOX; // visual start
    grid[tc][tr] = b; balls.push(b);
    sndFrag();
    addAnim('fragLand', b, {}, CFG.FRAG_FLY);
  } else if (exist.ci === frag.ci && exist.level === 1) {
    removeFromGrid(exist);
    balls = balls.filter(function(b){return b.id!==exist.id;});
    var b2 = new Ball(tc, tr, frag.ci, 2);
    grid[tc][tr] = b2; balls.push(b2);
    combo++;
    var mult2 = 1 + (combo-1)*CFG.COMBO_STEP;
    score += Math.floor(CFG.SCORE_L1 * mult2);
    sndMergeLv(1);
    addAnim('merge', b2, {}, CFG.MERGE_FLASH);
  } else {
    var emp = findNearestEmpty(tc, tr);
    if (emp) {
      var b3 = new Ball(emp.col, emp.row, frag.ci, 1);
      grid[emp.col][emp.row] = b3; balls.push(b3);
      sndFrag();
      addAnim('fragLand', b3, {}, CFG.FRAG_FLY);
    }
  }
}

function checkAllMerges(depth) {
  if (depth > CFG.MAX_DEPTH) { endCombo(); return; }
  for (var i = 0; i < balls.length; i++) {
    var b = balls[i];
    var nbs = getSameNeighbors(b);
    if (nbs.length > 0) {
      // only trigger for one pair
      if (b.level < 3) {
        tryMerge(b, depth);
      } else {
        doExplode(b, nbs[0], depth);
      }
      return;
    }
  }
  endCombo();
}

/* ===== VIBRATE ===== */
function doVibrate() {
  if (gameOver || state !== 'idle') return;
  // warning shake visual
  addAnim('vibWarn', null, {}, CFG.VIB_WARN);
  sndVibWarn();
  state = 'vibrating';
  setTimeout(function(){
    var moved = false;
    // gather movable balls
    var list = [];
    for (var r = CFG.ROWS-1; r >= 0; r--) {
      for (var c = 0; c < CFG.COLS; c++) {
        if (grid[c][r] && !grid[c][r].anim && grid[c][r].level < 3) {
          list.push({ball:grid[c][r],c:c,r:r});
        }
      }
    }
    // shuffle
    for (var si = list.length-1; si > 0; si--) {
      var ri = Math.floor(Math.random()*(si+1));
      var tmp = list[si]; list[si] = list[ri]; list[ri] = tmp;
    }
    var limit = Math.floor(list.length * CFG.VIB_PROB);
    for (var vi = 0; vi < limit; vi++) {
      var item = list[vi];
      var dirs = [];
      if (item.c>0 && !grid[item.c-1][item.r]) dirs.push([-1,0]);
      if (item.c<CFG.COLS-1 && !grid[item.c+1][item.r]) dirs.push([1,0]);
      if (item.r>0 && !grid[item.c][item.r-1]) dirs.push([0,-1]);
      if (item.r<CFG.ROWS-1 && !grid[item.c][item.r+1]) dirs.push([0,1]);
      if (dirs.length === 0) continue;
      var pick = dirs[Math.floor(Math.random()*dirs.length)];
      var nc2 = item.c+pick[0], nr2 = item.r+pick[1];
      grid[item.c][item.r] = null;
      grid[nc2][nr2] = item.ball;
      item.ball.col = nc2; item.ball.row = nr2;
      moved = true;
    }
    if (moved) {
      setTimeout(function(){ checkAllMerges(0); }, 50);
    } else {
      state = 'idle';
    }
  }, CFG.VIB_WARN);
}

/* ===== DROP ===== */
function dropBall(col) {
  if (gameOver) return;
  if (state !== 'idle') return;
  ensureAudio();
  var tgtRow = -1;
  for (var r = CFG.ROWS-1; r >= 0; r--) {
    if (grid[col][r] === null) { tgtRow = r; break; }
  }
  if (tgtRow === -1) {
    // col full, try game over check
    if (graceTimer < 0) { graceTimer = CFG.GRACE_MS; graceCol = col; }
    return;
  }
  var b = new Ball(col, tgtRow, nextCI, 1);
  grid[col][tgtRow] = b; balls.push(b);
  sndDrop();
  b.anim = 'drop';
  addAnim('drop', b, {fromY:-cellSz, toY:tgtRow*cellSz}, CFG.DROP_MS);
  nextCI = randCI(nextCI);
  state = 'dropping';
  setTimeout(function(){
    b.anim = null;
    tryMerge(b, 0);
  }, CFG.DROP_MS + 10);
}

/* ===== GAME OVER ===== */
function checkGameOver() {
  if (gameOver) return;
  // check if any col has space in row 0
  for (var c = 0; c < CFG.COLS; c++) {
    if (grid[c][0] === null) {
      if (graceTimer >= 0) { graceTimer = -1; graceCol = -1; }
      return;
    }
  }
  // all row 0 filled
  if (graceTimer < 0) { graceTimer = CFG.GRACE_MS; }
}

/* ===== RENDER HELPERS ===== */
function easeOut(t) { return 1 - Math.pow(1-t, 3); }
function easeInOut(t) { return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function drawBall(b, now) {
  var x = gridOX + b.x + cellSz/2;
  var y = gridOY + b.y + cellSz/2;
  var r;
  if (b.level===1) r=CFG.R1; else if(b.level===2) r=CFG.R2; else { r=CFG.R3; r *= 1+0.05*Math.sin(now/400*Math.PI+b.pulse); }
  r *= b.scale;

  ctx.save();
  ctx.globalAlpha = b.opacity;
  if (b.level >= 2) { ctx.shadowColor = b.color; ctx.shadowBlur = b.level===2?8:16; }
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle = b.color; ctx.fill();
  // highlight
  var hl = ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
  hl.addColorStop(0,'rgba(255,255,255,0.4)'); hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = hl; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

/* ===== MAIN LOOP ===== */
var lastTime = 0;
function loop(now) {
  requestAnimationFrame(loop);
  var dt = Math.min(now - lastTime, 50);
  lastTime = now;

  // vibrate timer
  if (state === 'idle' && !gameOver) {
    vibrateAcc += dt;
    if (vibrateAcc >= CFG.VIB_INTERVAL) { vibrateAcc = 0; doVibrate(); }
  }

  // grace timer
  if (graceTimer >= 0) {
    graceTimer -= dt;
    if (graceTimer <= 0) {
      gameOver = true; state = 'gameover';
      sndGameOver();
      if (score > hi) { hi = score; localStorage.setItem('cascade_hi', String(hi)); }
      if (maxCombo > parseInt(localStorage.getItem('cascade_mc')||'0',10)) localStorage.setItem('cascade_mc', String(maxCombo));
    }
  }

  // shake
  var sx = 0, sy = 0;
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    sx = (Math.random()-0.5)*shakeX*2; sy = (Math.random()-0.5)*shakeY*2;
  }

  // draw
  ctx.save();
  ctx.translate(sx, sy);

  // bg
  var grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,CFG.BG_TOP); grad.addColorStop(1,CFG.BG_BOT);
  ctx.fillStyle = grad; ctx.fillRect(-10,-10,W+20,H+20);

  // grid lines
  ctx.strokeStyle = CFG.GRID_LINE; ctx.lineWidth = 1;
  var gc, gr2;
  for (gc = 0; gc <= CFG.COLS; gc++) {
    ctx.beginPath();
    ctx.moveTo(gridOX+gc*cellSz, gridOY);
    ctx.lineTo(gridOX+gc*cellSz, gridOY+CFG.ROWS*cellSz);
    ctx.stroke();
  }
  for (gr2 = 0; gr2 <= CFG.ROWS; gr2++) {
    ctx.beginPath();
    ctx.moveTo(gridOX, gridOY+gr2*cellSz);
    ctx.lineTo(gridOX+CFG.COLS*cellSz, gridOY+gr2*cellSz);
    ctx.stroke();
  }

  // danger zone highlight row 0
  ctx.fillStyle = 'rgba(255,0,0,0.03)';
  ctx.fillRect(gridOX, gridOY, CFG.COLS*cellSz, cellSz);

  // process animations
  var i, a, p, bRef, exX, exY, exR, alpha;
  for (i = anims.length-1; i >= 0; i--) {
    a = anims[i];
    p = Math.min(1, (now - a.t0) / a.dur);
    if (a.type === 'drop') {
      bRef = a.ball;
      bRef.y = a.data.fromY + (a.data.toY - a.data.fromY) * easeOut(p);
    } else if (a.type === 'merge') {
      bRef = a.ball;
      if (p < 0.5) bRef.scale = 1 + 0.4 * (p/0.5);
      else bRef.scale = 1.4 - 0.4 * ((p-0.5)/0.5);
    } else if (a.type === 'explode') {
      exX = a.data.x; exY = a.data.y;
      exR = 10 + 60 * p; alpha = 1 - p;
      ctx.save(); ctx.globalAlpha = alpha * 0.8;
      ctx.beginPath(); ctx.arc(exX+gridOX, exY+gridOY, exR, 0, Math.PI*2);
      var eGrad = ctx.createRadialGradient(exX+gridOX,exY+gridOY,0,exX+gridOX,exY+gridOY,exR);
      eGrad.addColorStop(0, a.data.color); eGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = eGrad; ctx.fill(); ctx.restore();
    } else if (a.type === 'fragLand') {
      bRef = a.ball;
      bRef.x = bRef.col * cellSz; bRef.y = bRef.row * cellSz;
      if (p < 0.5) bRef.scale = 1.5 - p;
      else bRef.scale = 1;
    } else if (a.type === 'vibWarn') {
      // all balls tremble
      for (var vi = 0; vi < balls.length; vi++) {
        if (balls[vi].level < 3) {
          balls[vi].scale = 0.95 + 0.1 * Math.sin(now / 25);
        }
      }
    }
    if (p >= 1) {
      a.done = true;
      if (a.ball) { a.ball.scale = 1; a.ball.anim = null; }
    }
  }
  anims = anims.filter(function(a){ return !a.done; });

  // draw balls
  for (i = 0; i < balls.length; i++) drawBall(balls[i], now);

  // preview
  ctx.save();
  ctx.fillStyle = '#ccc'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('下一个', W/2, 18);
  ctx.beginPath(); ctx.arc(W/2, 36, 12, 0, Math.PI*2);
  ctx.fillStyle = CFG.COLORS[nextCI]; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // score UI
  ctx.save();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('分数: ' + score, 12, 24);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa'; ctx.font = '14px sans-serif';
  ctx.fillText('最高: ' + hi, W - 12, 24);
  ctx.restore();

  // combo
  if (combo > 1 && state !== 'gameover') {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#FFD700';
    var comboY = gridOY + CFG.ROWS * cellSz + 28;
    ctx.fillText('COMBO x' + combo, W/2, comboY);
    ctx.restore();
  }

  // vibrate indicator
  if (state === 'idle' && !gameOver) {
    var pct = vibrateAcc / CFG.VIB_INTERVAL;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    var barW = 60, barH = 4;
    var barX = W/2 - barW/2, barY = gridOY + CFG.ROWS * cellSz + 8;
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = 'rgba(255,200,50,0.5)';
    ctx.fillRect(barX, barY, barW * pct, barH);
    ctx.restore();
  }

  // game over screen
  if (gameOver) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FF4757'; ctx.font = 'bold 36px sans-serif';
    ctx.fillText('游戏结束', W/2, H/2 - 60);
    ctx.fillStyle = '#fff'; ctx.font = '24px sans-serif';
    ctx.fillText('分数: ' + score, W/2, H/2 - 10);
    ctx.fillStyle = '#aaa'; ctx.font = '18px sans-serif';
    ctx.fillText('最高: ' + hi + '  最高连击: ' + maxCombo, W/2, H/2 + 25);
    // restart button
    var bx = W/2-80, by = H/2+50, bw = 160, bh = 50;
    ctx.fillStyle = '#3742FA';
    roundRect(ctx, bx, by, bw, bh, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('再来一局', W/2, by + 32);
    ctx.restore();
  }

  // start screen
  if (state === 'start') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2ED573'; ctx.font = 'bold 32px sans-serif';
    ctx.fillText('Cascade', W/2, H/2 - 50);
    ctx.fillStyle = '#ECCC68'; ctx.font = '18px sans-serif';
    ctx.fillText('爆裂连锁', W/2, H/2 - 18);
    ctx.fillStyle = '#ccc'; ctx.font = '16px sans-serif';
    ctx.fillText('点击放球 · 同色合并 · 最大爆炸', W/2, H/2 + 20);
    var sbx = W/2-80, sby = H/2+50, sbw = 160, sbh = 50;
    ctx.fillStyle = '#FF4757';
    roundRect(ctx, sbx, sby, sbw, sbh, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('开始游戏', W/2, sby + 32);
    ctx.restore();
  }

  ctx.restore(); // shake
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

/* ===== INPUT ===== */
function handleTap(px, py) {
  ensureAudio();
  if (state === 'start') {
    state = 'idle'; return;
  }
  if (gameOver) {
    // check restart button
    var bx = W/2-80, by = H/2+50, bw = 160, bh = 50;
    if (px >= bx && px <= bx+bw && py >= by && py <= by+bh) {
      initState(); state = 'idle';
    }
    return;
  }
  var x = px - gridOX;
  var col = Math.floor(x / cellSz);
  if (col >= 0 && col < CFG.COLS) dropBall(col);
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  handleTap(t.clientX, t.clientY);
}, {passive:false});

canvas.addEventListener('click', function(e) {
  handleTap(e.clientX, e.clientY);
});

/* ===== INIT ===== */
initState();
state = 'start';
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
