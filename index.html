<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日小游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
h1 { font-size: 2.5em; margin-bottom: 10px; }
.subtitle { color: #888; margin-bottom: 40px; }
.game-list { display: grid; gap: 20px; max-width: 600px; width: 100%; }
.empty { color: #555; text-align: center; padding: 60px 20px; font-size: 1.1em; }
</style>
</head>
<body>
<h1>🎮 每日小游戏</h1>
<p class="subtitle">每天一款创新小游戏，由 AI 设计与开发</p>
<div class="game-list">
<div class="empty">暂无游戏，敬请期待</div>
</div>
</body>
</html>
