<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>镜像漂移</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; touch-action: none; }
canvas { display: block; max-width: 100vw; max-height: 100vh; object-fit: contain; }
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<script>
// ============================================
// Constants & Config
// ============================================
const W = 800, H = 600, MID = 400;
const FPS = 60;
const MARBLE_R = 12;
const ELASTICITY = 0.08;
const MAX_SPEED = 6;
const KEYBOARD_INFLUENCE = 3;
const TRAIL_LEN = 15;
const MAX_WALLS = 12;
const MAX_PARTICLES = 200;
const STAR_COLLECT_DIST = 25;

const COLORS = {
  bgLeft: '#0a0a2e',
  bgRight: '#2e0a1a',
  midLine: 'rgba(255,255,255,0.3)',
  marbleLeft: '#00e5ff',
  marbleRight: '#ff4081',
  wallFill: 'rgba(255,255,255,0.1)',
  wallStroke: 'rgba(255,255,255,0.4)',
  gapEdge: '#ffab00',
  star: '#ffd740',
  combo: '#ff6e40',
  text: '#ffffff',
  perfectGold: '#ffd740',
};

// Difficulty tiers
function getDifficulty(score) {
  if (score <= 10) return { wallSpeed: 1.5, gapWidth: 120, wallSpacing: 180, moving: false, dualGap: false, shrinking: false };
  if (score <= 25) return { wallSpeed: 2.0, gapWidth: 100, wallSpacing: 160, moving: true, dualGap: false, shrinking: false };
  if (score <= 50) return { wallSpeed: 2.5, gapWidth: 85, wallSpacing: 140, moving: true, dualGap: true, shrinking: false };
  if (score <= 80) return { wallSpeed: 3.0, gapWidth: 70, wallSpacing: 130, moving: true, dualGap: true, shrinking: true };
  return { wallSpeed: 3.5, gapWidth: 60, wallSpacing: 120, moving: true, dualGap: true, shrinking: true };
}

// ============================================
// Canvas
// ============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ============================================
// Audio Engine (Web Audio API)
// ============================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  function makeOsc(freq, type2, dur, freqEnd) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type2;
    o.frequency.setValueAtTime(freq, now);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, now + dur);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now); o.stop(now + dur);
  }
  switch (type) {
    case 'cross': makeOsc(800, 'sine', 0.1, 1200); break;
    case 'star': makeOsc(1200, 'square', 0.05); break;
    case 'perfect':
      [523.25, 659.25, 783.99].forEach(f => { makeOsc(f, 'sine', 0.3); });
      break;
    case 'death': makeOsc(200, 'sawtooth', 0.4, 80); break;
    case 'combo5': [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, now + i * 0.1);
      g.gain.setValueAtTime(0.12, now + i * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.15);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.15);
    }); break;
    case 'start': [261.63, 329.63, 392, 523.25].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, now + i * 0.08);
      g.gain.setValueAtTime(0.1, now + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.1);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.1);
    }); break;
  }
}

// ============================================
// Particle System
// ============================================
class Particle {
  constructor() { this.active = false; }
  init(x, y, vx, vy, life, decay, radius, color) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.decay = decay; this.radius = radius; this.color = color;
    this.active = true;
  }
  update(dt) {
    if (!this.active) return;
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.life -= this.decay * dt;
    if (this.life <= 0) this.active = false;
  }
}

const particles = [];
for (let i = 0; i < MAX_PARTICLES; i++) particles.push(new Particle());

function spawnParticle(x, y, vx, vy, life, decay, radius, color) {
  for (const p of particles) {
    if (!p.active) { p.init(x, y, vx, vy, life, decay, radius, color); return; }
  }
}

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 3;
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, 1, 0.02 + Math.random() * 0.02, 2 + Math.random() * 3, color);
  }
}

function spawnPerfectEffect(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, 1, 0.015, 3 + Math.random() * 4, COLORS.perfectGold);
  }
}

// ============================================
// Background stars
// ============================================
const bgStars = [];
for (let i = 0; i < 100; i++) {
  bgStars.push({ x: Math.random() * W, y: Math.random() * H, s: 0.5 + Math.random() * 1.5, b: Math.random() });
}

function drawBackground() {
  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, COLORS.bgLeft);
  grad.addColorStop(0.5, '#1a1a2a');
  grad.addColorStop(1, COLORS.bgRight);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  const t = performance.now() * 0.001;
  for (const s of bgStars) {
    const alpha = 0.3 + 0.3 * Math.sin(t + s.b * 10);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Middle line - dashed with pulse
  const pulse = 0.2 + 0.15 * Math.sin(t * 2);
  ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(MID, 0); ctx.lineTo(MID, H);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ============================================
// Utility
// ============================================
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ============================================
// Marble
// ============================================
class Marble {
  constructor(side) {
    this.side = side;
    this.x = side === 'left' ? MID / 2 : MID + MID / 2;
    this.y = H / 2;
    this.vx = 0; this.vy = 0;
    this.radius = MARBLE_R;
    this.trail = [];
    this.color = side === 'left' ? COLORS.marbleLeft : COLORS.marbleRight;
    this.alive = true;
  }
  reset() {
    this.x = this.side === 'left' ? MID / 2 : MID + MID / 2;
    this.y = H / 2;
    this.vx = 0; this.vy = 0;
    this.trail = [];
    this.alive = true;
  }
  update(dt, targetX, targetY) {
    if (!this.alive) return;
    const fx = (targetX - this.x) * ELASTICITY;
    const fy = (targetY - this.y) * ELASTICITY;
    this.vx += fx * dt;
    this.vy += fy * dt;
    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > MAX_SPEED) { this.vx = (this.vx / spd) * MAX_SPEED; this.vy = (this.vy / spd) * MAX_SPEED; }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // Bounds
    if (this.side === 'left') {
      this.x = clamp(this.x, this.radius, MID - this.radius);
    } else {
      this.x = clamp(this.x, MID + this.radius, W - this.radius);
    }
    this.y = clamp(this.y, this.radius, H - this.radius);
    // Trail
    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > TRAIL_LEN) this.trail.pop();
  }
  draw() {
    if (!this.alive) return;
    // Trail
    for (let i = 1; i < this.trail.length; i++) {
      const alpha = (1 - i / this.trail.length) * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.radius * (1 - i / this.trail.length * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Glow
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 2);
    grd.addColorStop(0, this.color);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
    ctx.fill();
    // Marble
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================
// Wall
// ============================================
class Wall {
  constructor() { this.active = false; }
  init(y, gapX, gapWidth, speed, moving, moveSpeed, shrinking) {
    this.y = y; this.gapX = gapX; this.gapWidth = gapWidth;
    this.speed = speed; this.scored = false; this.hasStar = true;
    this.starX = gapX; this.starY = y;
    this.active = true;
    this.moving = moving; this.moveDir = 1; this.moveSpeed = moveSpeed || 0.5;
    this.shrinking = shrinking;
    this.initialGapWidth = gapWidth;
    this.dualGap = false;
    this.gapX2 = 0;
  }
  update(dt) {
    if (!this.active) return;
    this.y += this.speed * dt;
    this.starY = this.y;
    if (this.moving) {
      const maxL = this.gapWidth / 2 + 20;
      const maxR = MID - this.gapWidth / 2 - 20;
      this.gapX += this.moveDir * this.moveSpeed * dt;
      if (this.gapX <= maxL) { this.gapX = maxL; this.moveDir = 1; }
      if (this.gapX >= maxR) { this.gapX = maxR; this.moveDir = -1; }
      this.starX = this.gapX;
      if (this.dualGap) {
        this.gapX2 += this.moveDir * this.moveSpeed * dt;
        if (this.gapX2 <= maxL) this.gapX2 = maxL;
        if (this.gapX2 >= maxR) this.gapX2 = maxR;
      }
    }
    if (this.shrinking && this.scored === false) {
      // Shrink slowly
      const elapsed = 1 - (this.y + 40) / (H + 80);
      this.gapWidth = this.initialGapWidth * (1 - elapsed * 0.3);
    }
    if (this.y > H + 40) this.active = false;
  }
  draw() {
    if (!this.active) return;
    const halfH = 10;
    ctx.fillStyle = COLORS.wallFill;
    ctx.strokeStyle = COLORS.wallStroke;
    ctx.lineWidth = 2;

    if (this.dualGap && this.gapX2 > 0) {
      // Sort gaps
      const g1 = Math.min(this.gapX, this.gapX2);
      const g2 = Math.max(this.gapX, this.gapX2);
      const hw = this.gapWidth / 2;
      // Forward: left seg, middle seg, right seg
      this._drawRect(0, halfH, 0, g1 - hw);
      this._drawRect(g1 + hw, halfH, g1 + hw, g2 - hw);
      this._drawRect(g2 + hw, halfH, g2 + hw, MID);
      // Mirror: gaps are mirrored
      const mg1 = W - g1;
      const mg2 = W - g2;
      const mgMin = Math.min(mg1, mg2);
      const mgMax = Math.max(mg1, mg2);
      this._drawRect(MID, halfH, MID, mgMin - hw);
      this._drawRect(mgMin + hw, halfH, mgMin + hw, mgMax - hw);
      this._drawRect(mgMax + hw, halfH, mgMax + hw, W);
    } else {
      // Single gap
      const hw = this.gapWidth / 2;
      // Forward side
      this._drawRect(0, halfH, 0, this.gapX - hw);
      this._drawRect(this.gapX + hw, halfH, this.gapX + hw, MID);
      // Mirror side
      const mg = W - this.gapX;
      this._drawRect(MID, halfH, MID, mg - hw);
      this._drawRect(mg + hw, halfH, mg + hw, W);
    }

    // Star
    if (this.hasStar && !this.scored) {
      drawStar(this.starX, this.y, 6);
      drawStar(W - this.starX, this.y, 6);
    }
    // Gap edge indicators
    drawGapArrow(this.gapX, this.y, this.gapWidth, halfH);
    drawGapArrow(W - this.gapX, this.y, this.gapWidth, halfH);
    if (this.dualGap && this.gapX2 > 0) {
      drawGapArrow(this.gapX2, this.y, this.gapWidth, halfH);
      drawGapArrow(W - this.gapX2, this.y, this.gapWidth, halfH);
    }
  }
  _drawRect(xStart, halfH, left, right) {
    const w = right - left;
    if (w <= 0) return;
    ctx.fillRect(left, this.y - halfH, w, halfH * 2);
    ctx.strokeRect(left, this.y - halfH, w, halfH * 2);
  }
}

function drawStar(x, y, r) {
  const t = performance.now() * 0.003;
  const scale = 0.8 + 0.2 * Math.sin(t);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(t);
  ctx.scale(scale, scale);
  ctx.fillStyle = COLORS.star;
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(r * 0.4, 0);
  ctx.lineTo(0, r);
  ctx.lineTo(-r * 0.4, 0);
  ctx.closePath();
  ctx.fill();
  // Inner glow
  const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.5);
  grd.addColorStop(0, 'rgba(255,215,64,0.3)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawGapArrow(gapX, wallY, gapWidth, halfH) {
  ctx.fillStyle = COLORS.gapEdge;
  ctx.globalAlpha = 0.6;
  const arrSize = 8;
  // Left arrow
  const lx = gapX - gapWidth / 2;
  ctx.beginPath();
  ctx.moveTo(lx + arrSize, wallY - halfH - 5);
  ctx.lineTo(lx, wallY - halfH - 5);
  ctx.lineTo(lx + arrSize / 2, wallY - halfH - 5 - arrSize);
  ctx.fill();
  // Right arrow
  const rx = gapX + gapWidth / 2;
  ctx.beginPath();
  ctx.moveTo(rx - arrSize, wallY - halfH - 5);
  ctx.lineTo(rx, wallY - halfH - 5);
  ctx.lineTo(rx - arrSize / 2, wallY - halfH - 5 - arrSize);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================
// Object pools
// ============================================
const wallPool = [];
for (let i = 0; i < MAX_WALLS; i++) wallPool.push(new Wall());
const activeWalls = [];

function acquireWall() {
  for (const w of wallPool) {
    if (!w.active) return w;
  }
  return null;
}

// ============================================
// Input Manager
// ============================================
const input = {
  targetX: MID / 2, targetY: H / 2,
  ax: 0, ay: 0,
  hasMouse: false, hasKeyboard: false,
  clicked: false,
};

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  input.targetX = (e.clientX - rect.left) * scaleX;
  input.targetY = (e.clientY - rect.top) * scaleY;
  input.targetX = clamp(input.targetX, 0, MID);
  input.hasMouse = true;
});

canvas.addEventListener('mousedown', e => {
  ensureAudio();
  input.clicked = true;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  input.clicked = true;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  input.targetX = clamp((touch.clientX - rect.left) * scaleX, 0, MID);
  input.targetY = (touch.clientY - rect.top) * scaleY;
  input.hasMouse = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  input.targetX = clamp((touch.clientX - rect.left) * scaleX, 0, MID);
  input.targetY = (touch.clientY - rect.top) * scaleY;
  input.hasMouse = true;
}, { passive: false });

const keysDown = {};
document.addEventListener('keydown', e => {
  keysDown[e.key] = true;
  ensureAudio();
  input.clicked = true;
  input.hasKeyboard = true;
});
document.addEventListener('keyup', e => {
  keysDown[e.key] = false;
});

function updateKeyInput() {
  input.ax = 0; input.ay = 0;
  if (keysDown['w'] || keysDown['W'] || keysDown['ArrowUp']) input.ay = -1;
  if (keysDown['s'] || keysDown['S'] || keysDown['ArrowDown']) input.ay = 1;
  if (keysDown['a'] || keysDown['A'] || keysDown['ArrowLeft']) input.ax = -1;
  if (keysDown['d'] || keysDown['D'] || keysDown['ArrowRight']) input.ax = 1;
}

// ============================================
// Collision Detection
// ============================================
function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
  if (rw <= 0 || rh <= 0) return false;
  const closestX = clamp(cx, rx, rx + rw);
  const closestY = clamp(cy, ry, ry + rh);
  const dx = cx - closestX, dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

function distToRect(cx, cy, rx, ry, rw, rh) {
  if (rw <= 0 || rh <= 0) return Infinity;
  const closestX = clamp(cx, rx, rx + rw);
  const closestY = clamp(cy, ry, ry + rh);
  const dx = cx - closestX, dy = cy - closestY;
  return Math.sqrt(dx * dx + dy * dy) - MARBLE_R;
}

// ============================================
// Game State
// ============================================
let state = 'menu';
let score = 0;
let combo = 0;
let bestScore = parseInt(localStorage.getItem('mirrorDrift_best')) || 0;
let deathDistance = 0;
let deathTimer = 0;
let wallSpawnTimer = 0;
let prevForwardX = 0, prevForwardY = 0;
let perfectFlash = 0;
let comboFlash = 0;
let nearMissFlash = 0;

const forwardMarble = new Marble('left');
const mirrorMarble = new Marble('right');

function resetGame() {
  score = 0; combo = 0; deathDistance = 0; deathTimer = 0;
  wallSpawnTimer = 0; perfectFlash = 0; comboFlash = 0; nearMissFlash = 0;
  forwardMarble.reset();
  mirrorMarble.reset();
  prevForwardX = forwardMarble.x;
  prevForwardY = forwardMarble.y;
  activeWalls.forEach(w => w.active = false);
  activeWalls.length = 0;
  particles.forEach(p => p.active = false);
}

// ============================================
// Update Functions
// ============================================
function updateMenu(dt) {
  // Float marbles gently
  const t = performance.now() * 0.001;
  forwardMarble.x = MID / 2 + Math.sin(t * 0.5) * 30;
  forwardMarble.y = H / 2 + Math.cos(t * 0.7) * 20;
  mirrorMarble.x = MID + MID / 2 - Math.sin(t * 0.5) * 30;
  mirrorMarble.y = H / 2 + Math.cos(t * 0.7) * 20;
  forwardMarble.trail.unshift({ x: forwardMarble.x, y: forwardMarble.y });
  if (forwardMarble.trail.length > TRAIL_LEN) forwardMarble.trail.pop();
  mirrorMarble.trail.unshift({ x: mirrorMarble.x, y: mirrorMarble.y });
  if (mirrorMarble.trail.length > TRAIL_LEN) mirrorMarble.trail.pop();
  // Particles
  particles.forEach(p => p.update(dt));
  if (input.clicked) {
    input.clicked = false;
    resetGame();
    playSound('start');
    state = 'playing';
  }
}

function updatePlaying(dt) {
  updateKeyInput();

  // Compute target
  let tx = input.targetX, ty = input.targetY;
  if (input.hasKeyboard) {
    tx += input.ax * KEYBOARD_INFLUENCE * 10 * dt;
    ty += input.ay * KEYBOARD_INFLUENCE * 10 * dt;
  }

  // If no mouse and no keyboard, keep target as current position (inertia)
  if (!input.hasMouse && !input.hasKeyboard) {
    tx = forwardMarble.x; ty = forwardMarble.y;
  }

  // Update forward marble
  prevForwardX = forwardMarble.x;
  prevForwardY = forwardMarble.y;
  forwardMarble.update(dt, tx, ty);

  // Mirror marble: apply mirrored dx
  if (mirrorMarble.alive) {
    const dx = forwardMarble.x - prevForwardX;
    const dy = forwardMarble.y - prevForwardY;
    mirrorMarble.x -= dx; // Mirror X
    mirrorMarble.y += dy;
    // Clamp mirror marble
    mirrorMarble.x = clamp(mirrorMarble.x, MID + mirrorMarble.radius, W - mirrorMarble.radius);
    mirrorMarble.y = clamp(mirrorMarble.y, mirrorMarble.radius, H - mirrorMarble.radius);
    mirrorMarble.trail.unshift({ x: mirrorMarble.x, y: mirrorMarble.y });
    if (mirrorMarble.trail.length > TRAIL_LEN) mirrorMarble.trail.pop();
  }

  // Spawn walls
  const diff = getDifficulty(score);
  const spawnInterval = diff.wallSpacing / diff.wallSpeed;
  wallSpawnTimer += dt;
  if (wallSpawnTimer >= spawnInterval) {
    wallSpawnTimer -= spawnInterval;
    const w = acquireWall();
    if (w) {
      const gapX = diff.gapWidth / 2 + 20 + Math.random() * (MID - diff.gapWidth - 40);
      w.init(-40, gapX, diff.gapWidth, diff.wallSpeed, diff.moving, 0.5 + score * 0.005, diff.shrinking);
      w.dualGap = diff.dualGap && Math.random() > 0.5;
      if (w.dualGap) {
        w.gapX2 = diff.gapWidth / 2 + 20 + Math.random() * (MID - diff.gapWidth - 40);
      }
      activeWalls.push(w);
    }
  }

  // Update walls
  for (const w of activeWalls) w.update(dt);

  // Collision & scoring
  for (const w of activeWalls) {
    if (!w.active || w.scored) continue;
    const halfH = 10;

    // Check if marble passed the wall
    if (forwardMarble.y < w.y && forwardMarble.alive) {
      w.scored = true;
      score++;
      let perfect = false;

      // Check if mirror marble also passed this frame
      if (mirrorMarble.alive && mirrorMarble.y < w.y) {
        perfect = true;
        score += 5;
        combo++;
        const comboBonus = combo * 2;
        score += comboBonus;
        perfectFlash = 1;
        playSound('perfect');
        spawnPerfectEffect(forwardMarble.x, forwardMarble.y);
        spawnPerfectEffect(mirrorMarble.x, mirrorMarble.y);
        if (combo === 5 || combo === 10 || combo === 20) {
          comboFlash = 1;
          playSound('combo5');
        }
      }

      playSound('cross');

      // Star collection
      const distF = Math.sqrt((forwardMarble.x - w.starX) ** 2 + (forwardMarble.y - w.starY) ** 2);
      if (distF < STAR_COLLECT_DIST && w.hasStar) {
        score += 3;
        playSound('star');
        spawnExplosion(w.starX, w.starY, COLORS.star, 10);
      }
      const mirStarX = W - w.starX;
      const distM = Math.sqrt((mirrorMarble.x - mirStarX) ** 2 + (mirrorMarble.y - w.starY) ** 2);
      if (distM < STAR_COLLECT_DIST && w.hasStar) {
        score += 3;
        playSound('star');
        spawnExplosion(mirStarX, w.starY, COLORS.star, 10);
      }

      w.hasStar = false;

      // Score popup
      if (perfect) {
        spawnScorePopup(forwardMarble.x, forwardMarble.y - 30, '+' + (1 + 5 + combo * 2 + 3), true);
      } else {
        combo = 0;
        spawnScorePopup(forwardMarble.x, forwardMarble.y - 30, '+1', false);
      }
    }

    // Collision detection - build wall rects and check
    const fw = w;
    
    // Build wall segments for forward side
    if (forwardMarble.alive) {
      let hit = false;
      const hw = fw.gapWidth / 2;
      if (fw.dualGap && fw.gapX2 > 0) {
        const g1 = Math.min(fw.gapX, fw.gapX2);
        const g2 = Math.max(fw.gapX, fw.gapX2);
        // Three segments
        hit = hit || circleRectCollision(forwardMarble.x, forwardMarble.y, MARBLE_R, 0, fw.y - halfH, g1 - hw, halfH * 2);
        hit = hit || circleRectCollision(forwardMarble.x, forwardMarble.y, MARBLE_R, g1 + hw, fw.y - halfH, g2 - hw - g1 - hw, halfH * 2);
        hit = hit || circleRectCollision(forwardMarble.x, forwardMarble.y, MARBLE_R, g2 + hw, fw.y - halfH, MID - g2 - hw, halfH * 2);
      } else {
        hit = circleRectCollision(forwardMarble.x, forwardMarble.y, MARBLE_R, 0, fw.y - halfH, fw.gapX - hw, halfH * 2) ||
              circleRectCollision(forwardMarble.x, forwardMarble.y, MARBLE_R, fw.gapX + hw, fw.y - halfH, MID - fw.gapX - hw, halfH * 2);
      }
      if (hit) {
        // Calculate nearest distance for near-miss
        let minDist = Infinity;
        const hw2 = fw.gapWidth / 2;
        if (fw.dualGap && fw.gapX2 > 0) {
          const g1 = Math.min(fw.gapX, fw.gapX2);
          const g2 = Math.max(fw.gapX, fw.gapX2);
          minDist = Math.min(
            distToRect(forwardMarble.x, forwardMarble.y, 0, fw.y - halfH, g1 - hw2, halfH * 2),
            distToRect(forwardMarble.x, forwardMarble.y, g1 + hw2, fw.y - halfH, g2 - g1 - hw2 * 2, halfH * 2),
            distToRect(forwardMarble.x, forwardMarble.y, g2 + hw2, fw.y - halfH, MID - g2 - hw2, halfH * 2)
          );
        } else {
          minDist = Math.min(
            distToRect(forwardMarble.x, forwardMarble.y, 0, fw.y - halfH, fw.gapX - hw2, halfH * 2),
            distToRect(forwardMarble.x, forwardMarble.y, fw.gapX + hw2, fw.y - halfH, MID - fw.gapX - hw2, halfH * 2)
          );
        }
        deathDistance = Math.abs(minDist);
        forwardMarble.alive = false;
        playSound('death');
        spawnExplosion(forwardMarble.x, forwardMarble.y, COLORS.marbleLeft, 25);
        combo = 0;
        triggerDeath();
      }
    }

    if (mirrorMarble.alive) {
      let hit = false;
      const hw = fw.gapWidth / 2;
      const mg = W - fw.gapX;
      if (fw.dualGap && fw.gapX2 > 0) {
        const mg1 = W - fw.gapX;
        const mg2 = W - fw.gapX2;
        const mgMin = Math.min(mg1, mg2);
        const mgMax = Math.max(mg1, mg2);
        hit = hit || circleRectCollision(mirrorMarble.x, mirrorMarble.y, MARBLE_R, MID, fw.y - halfH, mgMin - MID, halfH * 2);
        hit = hit || circleRectCollision(mirrorMarble.x, mirrorMarble.y, MARBLE_R, mgMin + hw, fw.y - halfH, mgMax - mgMin - hw * 2, halfH * 2);
        hit = hit || circleRectCollision(mirrorMarble.x, mirrorMarble.y, MARBLE_R, mgMax + hw, fw.y - halfH, W - mgMax - hw, halfH * 2);
      } else {
        hit = circleRectCollision(mirrorMarble.x, mirrorMarble.y, MARBLE_R, MID, fw.y - halfH, mg - hw - MID, halfH * 2) ||
              circleRectCollision(mirrorMarble.x, mirrorMarble.y, MARBLE_R, mg + hw, fw.y - halfH, W - mg - hw, halfH * 2);
      }
      if (hit) {
        let minDist = Infinity;
        const hw2 = fw.gapWidth / 2;
        if (fw.dualGap && fw.gapX2 > 0) {
          const mg1 = W - fw.gapX;
          const mg2 = W - fw.gapX2;
          const mgMin = Math.min(mg1, mg2);
          const mgMax = Math.max(mg1, mg2);
          minDist = Math.min(
            distToRect(mirrorMarble.x, mirrorMarble.y, MID, fw.y - halfH, mgMin - MID, halfH * 2),
            distToRect(mirrorMarble.x, mirrorMarble.y, mgMin + hw2, fw.y - halfH, mgMax - mgMin - hw2 * 2, halfH * 2),
            distToRect(mirrorMarble.x, mirrorMarble.y, mgMax + hw2, fw.y - halfH, W - mgMax - hw2, halfH * 2)
          );
        } else {
          minDist = Math.min(
            distToRect(mirrorMarble.x, mirrorMarble.y, MID, fw.y - halfH, mg - hw2 - MID, halfH * 2),
            distToRect(mirrorMarble.x, mirrorMarble.y, mg + hw2, fw.y - halfH, W - mg - hw2, halfH * 2)
          );
        }
        deathDistance = Math.abs(minDist);
        mirrorMarble.alive = false;
        if (forwardMarble.alive) {
          playSound('death');
          spawnExplosion(mirrorMarble.x, mirrorMarble.y, COLORS.marbleRight, 25);
        }
        combo = 0;
        triggerDeath();
      }
    }
  }

  // Clean up inactive walls
  for (let i = activeWalls.length - 1; i >= 0; i--) {
    if (!activeWalls[i].active) activeWalls.splice(i, 1);
  }

  // Update particles
  particles.forEach(p => p.update(dt));

  // Decay flashes
  if (perfectFlash > 0) perfectFlash -= 0.03 * dt;
  if (comboFlash > 0) comboFlash -= 0.02 * dt;
  if (nearMissFlash > 0) nearMissFlash -= 0.05 * dt;

  // Trail particles
  if (forwardMarble.alive && Math.random() < 0.3) {
    spawnParticle(forwardMarble.x, forwardMarble.y, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, 0.5, 0.03, 2, COLORS.marbleLeft);
  }
  if (mirrorMarble.alive && Math.random() < 0.3) {
    spawnParticle(mirrorMarble.x, mirrorMarble.y, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, 0.5, 0.03, 2, COLORS.marbleRight);
  }
}

function triggerDeath() {
  if (state !== 'playing') return;
  deathTimer = performance.now();
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('mirrorDrift_best', bestScore);
  }
  nearMissFlash = 0.8;
  state = 'dead';
}

function updateDead(dt) {
  particles.forEach(p => p.update(dt));
  // Don't consume input.clicked here — let the game loop handle restart check
}

// ============================================
// Score Popups
// ============================================
const scorePopups = [];
function spawnScorePopup(x, y, text, isGold) {
  scorePopups.push({ x, y, text, life: 1, isGold });
}

function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y -= 1 * dt;
    p.life -= 0.02 * dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (const p of scorePopups) {
    const size = p.isGold ? 20 + (1 - p.life) * 10 : 14;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.isGold ? COLORS.perfectGold : COLORS.text;
    ctx.font = `bold ${size}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================
// Draw Functions
// ============================================
function drawMenu() {
  drawBackground();
  forwardMarble.draw();
  mirrorMarble.draw();
  particles.forEach(p => {
    if (!p.active) return;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = COLORS.text;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('镜像漂移', W / 2, H / 2 - 80);

  // Subtitle
  ctx.globalAlpha = 0.6;
  ctx.font = '18px monospace';
  ctx.fillText('两侧弹珠同时存活', W / 2, H / 2 - 40);
  ctx.globalAlpha = 1;

  // Button
  const t = performance.now() * 0.003;
  const pulse = 0.7 + 0.3 * Math.sin(t);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = COLORS.text;
  ctx.font = '20px monospace';
  ctx.fillText('点击开始', W / 2, H / 2 + 20);
  ctx.globalAlpha = 1;

  // Best
  ctx.globalAlpha = 0.5;
  ctx.font = '16px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('最高分: ' + bestScore, W - 20, H - 20);
  ctx.textAlign = 'left';
  ctx.fillText('操作: 鼠标 / WASD / 方向键', 20, H - 20);
  ctx.globalAlpha = 1;
}

function drawPlaying() {
  drawBackground();

  // Perfect flash overlay
  if (perfectFlash > 0) {
    ctx.globalAlpha = perfectFlash * 0.3;
    ctx.fillStyle = COLORS.perfectGold;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Combo flash
  if (comboFlash > 0) {
    ctx.globalAlpha = comboFlash * 0.2;
    ctx.fillStyle = COLORS.combo;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Walls
  for (const w of activeWalls) w.draw();

  // Particles
  particles.forEach(p => {
    if (!p.active) return;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Marbles
  forwardMarble.draw();
  mirrorMarble.draw();

  // Score popups
  updateScorePopups(1);
  drawScorePopups();

  // UI
  ctx.fillStyle = COLORS.text;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('得分: ' + score, 15, 35);

  if (combo > 0) {
    ctx.fillStyle = COLORS.combo;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('连击: ' + combo, W - 15, 35);
  }
}

function drawDead() {
  drawBackground();

  // Still show walls and explosion
  for (const w of activeWalls) w.draw();
  particles.forEach(p => {
    if (!p.active) return;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  forwardMarble.draw();
  mirrorMarble.draw();
  drawScorePopups();

  // Near miss flash
  if (nearMissFlash > 0) {
    ctx.globalAlpha = nearMissFlash * 0.3;
    ctx.fillStyle = '#ff0000';
    // Screen edge flash
    ctx.fillRect(0, 0, W, 5);
    ctx.fillRect(0, H - 5, W, 5);
    ctx.fillRect(0, 0, 5, H);
    ctx.fillRect(W - 5, 0, 5, H);
    ctx.globalAlpha = 1;
  }

  // Delay before showing UI
  const elapsed = performance.now() - deathTimer;
  if (elapsed < 500) return;

  // Overlay
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Game Over
  ctx.fillStyle = COLORS.text;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', W / 2, H / 2 - 80);

  ctx.font = '24px monospace';
  ctx.fillText('得分: ' + score, W / 2, H / 2 - 30);
  ctx.fillText('最高分: ' + bestScore, W / 2, H / 2 + 5);

  // Near miss text
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#ff6e40';
  ctx.font = '18px monospace';
  const missDist = !isFinite(deathDistance) ? '∞' : deathDistance < 1 ? '<1' : Math.round(deathDistance);
  ctx.fillText('差: ' + missDist + 'px', W / 2, H / 2 + 40);
  ctx.globalAlpha = 1;

  // Retry
  const t = performance.now() * 0.003;
  const pulse = 0.7 + 0.3 * Math.sin(t);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = COLORS.text;
  ctx.font = '20px monospace';
  ctx.fillText('点击重来', W / 2, H / 2 + 90);
  ctx.globalAlpha = 1;
}

// ============================================
// Game Loop
// ============================================
let lastTime = performance.now();
let hidden = false;

document.addEventListener('visibilitychange', () => {
  hidden = document.hidden;
  if (!hidden) lastTime = performance.now();
});

function gameLoop(timestamp) {
  if (hidden) {
    requestAnimationFrame(gameLoop);
    return;
  }

  const dt = Math.min((timestamp - lastTime) / 16.667, 3);
  lastTime = timestamp;

  switch (state) {
    case 'menu':
      updateMenu(dt);
      drawMenu();
      break;
    case 'playing':
      updatePlaying(dt);
      drawPlaying();
      break;
    case 'dead':
      updateDead(dt);
      drawDead();
      // Allow restart after delay
      if (performance.now() - deathTimer > 500 && input.clicked) {
        input.clicked = false;
        resetGame();
        playSound('start');
        state = 'playing';
      }
      break;
  }

  input.clicked = false;
  requestAnimationFrame(gameLoop);
}

// ============================================
// Bootstrap
// ============================================
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
